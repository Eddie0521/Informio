name: Build Desktop Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: mac
            command: node scripts/run-electron-builder.cjs --mac dmg zip -c.mac.identity=null -c.mac.notarize=false -c.mac.hardenedRuntime=false -c.dmg.sign=false --publish always --config electron-builder.config.ts
            artifact_glob: release/*mac*
          - os: windows-2025
            platform: win
            command: node scripts/run-electron-builder.cjs --win nsis --publish always --config electron-builder.config.ts
            artifact_glob: release/*win*

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build renderer and main process
        run: pnpm build

      - name: Package desktop app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ${{ matrix.command }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: informio-${{ matrix.platform }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-22.04
    container:
      image: electronuserland/builder:20
      options: --platform linux/amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build renderer and main process
        run: pnpm build

      - name: Package desktop app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/run-electron-builder.cjs --linux AppImage --x64 --publish always --config electron-builder.config.ts

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: informio-linux
          path: release/*.AppImage
          if-no-files-found: error

  publish-linux-release:
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build
      - build-linux

    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: informio-linux
          path: release

      - name: Upload Linux assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release/*.AppImage
