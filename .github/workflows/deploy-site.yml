name: Site

on:
  pull_request:
    paths:
      - 'apps/site/**'
      - 'packages/brand/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
  push:
    branches:
      - main
    paths:
      - 'apps/site/**'
      - 'packages/brand/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm build:site
